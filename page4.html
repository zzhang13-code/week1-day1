<!DOCTYPE html>
<html>

<head>
    <title>My Website</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Container to wrap everything -->
    <div id="container">

        <!-- Brand of website -->
        <header>
            My Web Site Brand
        </header>

        <!-- Main Navigation -->
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="page2.html">About</a></li>
                <li><a href="page4.html">Gallery</a></li>
                <li><a href="page3.html">Contact</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main>
            <h1>My Fourth Heading</h1>

            <p>My Fourth paragraph.</p>

            <ul id="album">

                <!--
                <li id="photo"><img src="images/winterland1.jpg"></li>
                <li id="photo"><img src="images/winterland2.jpg"></li>
                <li id="photo"><img src="images/winterland3.jpg"></li>
                <li id="photo"><img src="images/winterland4.jpg"></li>
                <li id="photo"><img src="images/winterland5.jpg"></li>
                <li id="photo"><img src="images/winterland6.jpg"></li>
                -->

            </ul>

        </main>

        <!-- Footer Information -->
        <footer>
            &copy; Copyright 2020
        </footer>

    </div>

    <script>

        var photos = [];
        var fileNames = [];
        var imageList = [];
        var image;
        var openList = "<li id='photo'>";
        var closeList = "</li>";

        // Create a loop to create 6 images starting with index of 0
        for (var i = 0; i < 6; i++) {

            // Create image file name and store in the array
            fileNames.push("winterland" + (i + 1));

            // Assemble file name into image element and store in an array
            photos.push("<img src='images/" + fileNames[i] + ".jpg'>");

            // Assemble image element from array with list elements
            image = openList + photos[i] + closeList;

            // Store the assembled list codes into an array
            imageList.push(image);
        }

        // Display all six image codes stored in the array
        document.getElementById("album").innerHTML = imageList;

    </script>

</body>

</html>
